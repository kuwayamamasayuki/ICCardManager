<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <!-- PaSoRi Reader Body -->
  <rect x="100" y="150" width="200" height="120" rx="10" ry="10" fill="#e8e8e8" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- PaSoRi Touch Area -->
  <rect x="130" y="165" width="140" height="80" rx="5" ry="5" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- PaSoRi NFC Symbol -->
  <g transform="translate(200, 205)" fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-linecap="round">
    <path d="M-8,8 A15,15 0 0,1 -8,-8"/>
    <path d="M-13,12 A22,22 0 0,1 -13,-12"/>
    <path d="M-18,16 A29,29 0 0,1 -18,-16"/>
    <circle cx="-5" cy="0" r="2.5" fill="#9e9e9e" stroke="none"/>
  </g>

  <!-- PaSoRi Label -->
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#757575">PaSoRi</text>

  <!-- USB Cable hint -->
  <rect x="190" y="270" width="20" height="6" rx="2" ry="2" fill="#bdbdbd"/>

  <!-- Staff Card (tilted, approaching PaSoRi) -->
  <g transform="translate(200, 100) rotate(-8)">
    <!-- Card body -->
    <rect x="-70" y="-45" width="140" height="90" rx="8" ry="8" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>

    <!-- Card Text -->
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="white">職員証</text>

    <!-- Card subtext -->
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#90CAF9">STAFF ID CARD</text>

    <!-- IC chip hint -->
    <rect x="-55" y="-35" width="22" height="16" rx="2" ry="2" fill="#42A5F5" stroke="#64B5F6" stroke-width="0.5"/>
  </g>

  <!-- Motion Arrow -->
  <g fill="none" stroke="#F57C00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200,130 L200,148"/>
    <polyline points="193,141 200,148 207,141"/>
  </g>

  <!-- Caption -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333333">ステップ1: 職員証をタッチ</text>
</svg>
