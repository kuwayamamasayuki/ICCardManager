<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="pasoriGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="icCardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
  </defs>

  <!-- PaSoRi Reader Body -->
  <rect x="100" y="150" width="200" height="120" rx="10" ry="10" fill="url(#pasoriGrad2)" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow2)"/>

  <!-- PaSoRi Touch Area -->
  <rect x="130" y="165" width="140" height="80" rx="5" ry="5" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- PaSoRi NFC Symbol -->
  <g transform="translate(200, 205)" fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-linecap="round">
    <path d="M-8,8 A15,15 0 0,1 -8,-8"/>
    <path d="M-13,12 A22,22 0 0,1 -13,-12"/>
    <path d="M-18,16 A29,29 0 0,1 -18,-16"/>
    <circle cx="-5" cy="0" r="2.5" fill="#9e9e9e" stroke="none"/>
  </g>

  <!-- PaSoRi Label -->
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#757575">PaSoRi</text>

  <!-- USB Cable hint -->
  <rect x="190" y="270" width="20" height="6" rx="2" ry="2" fill="#bdbdbd"/>

  <!-- IC Card (tilted, approaching PaSoRi) -->
  <g transform="translate(200, 100) rotate(-8)">
    <rect x="-70" y="-45" width="140" height="90" rx="8" ry="8" fill="url(#icCardGrad)" stroke="#0288D1" stroke-width="1.5" filter="url(#shadow2)"/>

    <!-- Card Text -->
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="white">交通系</text>

    <!-- Card subtext -->
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">IC CARD</text>

    <!-- IC chip hint -->
    <rect x="-55" y="-35" width="22" height="16" rx="2" ry="2" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>

    <!-- Train icon (simple) -->
    <g transform="translate(40, -25)" fill="rgba(255,255,255,0.4)">
      <rect x="-8" y="-6" width="16" height="14" rx="3" ry="3"/>
      <rect x="-5" y="8" width="2" height="3"/>
      <rect x="3" y="8" width="2" height="3"/>
    </g>
  </g>

  <!-- Motion Arrow -->
  <g fill="none" stroke="#F57C00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200,130 L200,148"/>
    <polyline points="193,141 200,148 207,141"/>
  </g>

  <!-- Caption -->
  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">ステップ2: 交通系ICカードをタッチ</text>
</svg>
