name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'ICCardManager/src/ICCardManager/ICCardManager.csproj'

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies (locked mode)
        run: dotnet restore ICCardManager/ICCardManager.sln --locked-mode

      - name: Build
        run: dotnet build ICCardManager/ICCardManager.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ICCardManager/tests/ICCardManager.Tests/ICCardManager.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Publish self-contained executable
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration Release `
            --runtime win-x86 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.get_version.outputs.VERSION }} `
            --output ./publish

      - name: Create release archive
        shell: pwsh
        run: |
          # Create release directory
          New-Item -ItemType Directory -Force -Path "./release"

          # Copy executable and resources
          Copy-Item "./publish/ICCardManager.exe" "./release/"
          Copy-Item -Recurse "./publish/Resources" "./release/"

          # Create ZIP archive
          Compress-Archive -Path "./release/*" -DestinationPath "./ICCardManager_v${{ steps.get_version.outputs.VERSION }}.zip"

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## ICCardManager v${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 動作環境" >> $GITHUB_OUTPUT
          echo "- Windows 10/11 (32-bit/64-bit)" >> $GITHUB_OUTPUT
          echo "- Sony PaSoRi (RC-S380等)" >> $GITHUB_OUTPUT
          echo "- .NET Runtime: 不要（self-contained）" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### インストール方法" >> $GITHUB_OUTPUT
          echo "1. ZIPファイルを任意のフォルダに展開" >> $GITHUB_OUTPUT
          echo "2. \`ICCardManager.exe\` を実行" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### ファイル構成" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "ICCardManager/" >> $GITHUB_OUTPUT
          echo "├── ICCardManager.exe" >> $GITHUB_OUTPUT
          echo "└── Resources/" >> $GITHUB_OUTPUT
          echo "    ├── Sounds/" >> $GITHUB_OUTPUT
          echo "    └── Templates/" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate checksums
        shell: pwsh
        run: |
          $zipFile = "./ICCardManager_v${{ steps.get_version.outputs.VERSION }}.zip"
          $hash = (Get-FileHash -Path $zipFile -Algorithm SHA256).Hash
          "$hash  ICCardManager_v${{ steps.get_version.outputs.VERSION }}.zip" | Out-File -FilePath "./SHA256SUMS.txt" -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ICCardManager v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            ./ICCardManager_v${{ steps.get_version.outputs.VERSION }}.zip
            ./SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ICCardManager-v${{ steps.get_version.outputs.VERSION }}
          path: ./release/
          retention-days: 90
